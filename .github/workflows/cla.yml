name: CLA Assistant

# Requires every contributor to sign the Contributor License Agreement (CLA.md)
# once before their pull request can be merged. Signatures are stored as a JSON
# file inside this repo — no third-party service holds the records.
#
# Setup (one time):
#   Settings → Secrets and variables → Actions → New repository secret
#   Name:  PERSONAL_ACCESS_TOKEN
#   Value: a fine-grained PAT with Contents: read/write on mailkite/mail
#          (used only to append signatures to the signatures file below).
# The built-in GITHUB_TOKEN is used for PR comments and needs no setup.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/mailkite/mail/blob/main/CLA.md'
          branch: 'cla-signatures'
          allowlist: 'bucabay,bot*,dependabot[bot]'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-notsigned-prcomment: >
            Thanks for your pull request. Before we can merge it, we need you to
            agree to the [Contributor License Agreement](https://github.com/mailkite/mail/blob/main/CLA.md).
            It's a one-time action that covers all your future contributions — you
            keep the copyright to your work. To sign, post a new comment on this PR
            with exactly:
